<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center bg-white p-6 rounded-lg shadow">
            <h1 class="text-2xl font-bold text-gray-800" id="warehouse-name">กำลังโหลดข้อมูลคลังสินค้า...</h1>
            <button onclick="fetchDashboardData()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition">
                รีเฟรชข้อมูล (Refresh)
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-500">
                <p class="text-gray-500 text-sm font-semibold">สินค้าที่ใกล้หมด (Near Out of Stock)</p>
                <p class="text-3xl font-bold text-gray-800 mt-2" id="near-out-count">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                <p class="text-gray-500 text-sm font-semibold">สินค้าหมดสต็อก (Out of Stock)</p>
                <p class="text-3xl font-bold text-red-600 mt-2" id="out-of-stock-count">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm font-semibold">รวมรายการที่ต้องสั่งซื้อ</p>
                <p class="text-3xl font-bold text-gray-800 mt-2" id="total-low-count">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> สินค้าต้องสั่งซื้อด่วน
                </h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th class="p-3">รหัสสินค้า (Product ID)</th>
                                <th class="p-3">คงเหลือ</th>
                            </tr>
                        </thead>
                        <tbody id="low-stock-table-body" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> ประวัติล่าสุด (10 รายการ)
                </h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th class="p-3">ประเภท</th>
                                <th class="p-3">จำนวน</th>
                                <th class="p-3">เอกสารอ้างอิง</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table-body" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ตั้งค่า API (เปลี่ยนเลข 3 เป็น ID คลังสินค้าของคุณถ้าจำเป็น)
        const API_URL = 'http://127.0.0.1:8000/warehouse/dashboard/3/'; // <-- เปลี่ยน URL ให้ตรงกับ LowStockAlertAPIView ของคุณ
        
        // แปลง Username:Password เป็น Base64 สำหรับ Basic Auth
        const token = btoa('tester:zxc010203'); 

        async function fetchDashboardData() {
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Basic ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                renderDashboard(data);

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('warehouse-name').innerText = "เกิดข้อผิดพลาดในการดึงข้อมูล (เช็ค CORS หรือ URL)";
            }
        }

        function renderDashboard(data) {
            // 1. อัปเดตข้อมูลสรุป
            document.getElementById('warehouse-name').innerText = `คลังสินค้า: ${data.warehouse_name || 'ไม่ระบุ'}`;
            
            if (data.summary) {
                document.getElementById('near-out-count').innerText = data.summary.near_out_of_stock || 0;
                document.getElementById('out-of-stock-count').innerText = data.summary.out_of_stock || 0;
                document.getElementById('total-low-count').innerText = data.summary.total_low_stock || 0;
            }

            // 2. เรนเดอร์ตารางของขาด
            const lowStockBody = document.getElementById('low-stock-table-body');
            lowStockBody.innerHTML = ''; // Clear old data
            
            if (data.low_stock_products && data.low_stock_products.length > 0) {
                data.low_stock_products.forEach(item => {
                    const isOut = item.quantity === 0;
                    const row = `<tr class="${isOut ? 'bg-red-50' : ''}">
                        <td class="p-3 text-gray-800 font-medium truncate max-w-xs" title="${item.product}">${item.product}</td>
                        <td class="p-3 font-bold ${isOut ? 'text-red-600' : 'text-orange-500'}">${item.quantity}</td>
                    </tr>`;
                    lowStockBody.innerHTML += row;
                });
            } else {
                lowStockBody.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-gray-500">ไม่มีสินค้าขาดสต็อก</td></tr>';
            }

            // 3. เรนเดอร์ประวัติ
            const txnBody = document.getElementById('transactions-table-body');
            txnBody.innerHTML = ''; // Clear old data

            if (data.recent_transactions && data.recent_transactions.length > 0) {
                data.recent_transactions.forEach(txn => {
                    // กำหนดสีป้ายตามประเภท
                    let badgeClass = 'bg-gray-200 text-gray-800';
                    if(txn.transaction_type === 'IN') badgeClass = 'bg-green-100 text-green-800';
                    if(txn.transaction_type === 'OUT') badgeClass = 'bg-red-100 text-red-800';
                    if(txn.transaction_type === 'ADJ') badgeClass = 'bg-blue-100 text-blue-800';

                    const row = `<tr>
                        <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeClass}">${txn.transaction_type}</span></td>
                        <td class="p-3 font-bold text-gray-700">${txn.quantity}</td>
                        <td class="p-3 text-gray-500 text-xs">${txn.reference_document || '-'}</td>
                    </tr>`;
                    txnBody.innerHTML += row;
                });
            } else {
                txnBody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-500">ไม่มีประวัติการเคลื่อนไหว</td></tr>';
            }
        }

        // โหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        fetchDashboardData();
    </script>
</body>
</html>
